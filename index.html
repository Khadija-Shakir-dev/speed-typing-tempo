


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tempo — Write with Purpose</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="eyebrow">Write with Intention</div>
      <h1>Craft Every <em>Word</em></h1>
      <p class="subtitle">One minute. Unlimited expression.</p>
    </div>

    <div class="divider"></div>

    <div class="textarea-wrap">
      <textarea id="text" placeholder="Begin your thoughts here…" spellcheck="true"></textarea>
      <div class="textarea-bar"></div>
    </div>

    <div class="timer-section">
      <div class="timer-ring-wrap">
        <!-- <svg class="timer-ring" viewBox="0 0 112 112" xmlns="/svg"\> -->
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#e2c99a"/>
              <stop offset="50%"  stop-color="#c9a96e"/>
              <stop offset="100%" stop-color="#b8924a"/>
            </linearGradient>
          </defs>
          <circle class="ring-track"    cx="56" cy="56" r="47.9"/>
          <circle class="ring-progress" cx="56" cy="56" r="47.9" id="ringProg"/>
        </svg>
        <div class="timer-text">
          <span class="timer-digits" id="timerDigits">1:00</span>
          <span class="timer-label-sm">remaining</span>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-pill">
        <span class="stat-num" id="charNum">0</span>
        <span class="stat-lbl">Characters</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="wordNum">0</span>
        <span class="stat-lbl">Words</span>
      </div>
    </div>

    <div class="btn-wrap">
      <button id="btn">Begin Session</button>
    </div>

  </div>
</div>

<div class="toast" id="toast">Session complete — beautifully done ✦</div>

<script src="script.js"></script>
</body>
</html>y
